# apm-handson-org policy for the APM Zenn article hands-on.
# See: https://microsoft.github.io/apm/enterprise/policy-reference/
name: "apm-handson-org Policy"
enforcement: block  # block | warn | off

dependencies:
  # Organisations/users whose packages are trusted inside apm-handson-org.
  allow:
    - "microsoft/**"
    - "github/**"
    - "anthropics/**"
    - "ry0y4n/**"
  # Deliberately flag anything whose repo name starts with "evil-".
  # Used to demonstrate how the policy blocks suspicious dependencies.
  deny:
    - "*/evil-*"

mcp:
  self_defined: warn
  transport:
    allow: [stdio, streamable-http]
